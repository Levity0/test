name: CI
on:
  pull_request:
  push:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Web/   # <-- change to the folder that has package.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Web/package-lock.json  # <-- update path too

      - run: npm ci
      - run: npm run test:ci
